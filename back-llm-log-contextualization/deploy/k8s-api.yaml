apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-log-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grid-log-api
  template:
    metadata:
      labels:
        app: grid-log-api
    spec:
      containers:
        - name: api
          image: your-registry/grid-log-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: GRID_APP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: grid-log-api-secrets
                  key: database_url
            - name: GRID_APP_HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grid-log-api-secrets
                  key: hf_token
            - name: GRID_APP_HF_MODEL
              value: katanemo/Arch-Router-1.5B:hf-inference
            - name: GRID_APP_STORAGE_DIR
              value: /app/storage
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grid-log-api-storage
---
apiVersion: v1
kind: Service
metadata:
  name: grid-log-api
spec:
  selector:
    app: grid-log-api
  ports:
    - port: 80
      targetPort: 8000
